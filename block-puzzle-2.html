<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BLOX — Block Puzzle</title>
<style>
  :root {
    --bg:      #0f0f1a;
    --surface: #1a1a2e;
    --surface2:#252540;
    --border:  #2e2e50;
    --text:    #e8e8f4;
    --muted:   #6b6b9a;
    --accent:  #7c6af5;
    --accent2: #f57c6a;
    --gold:    #f5c842;
    --c1:#7c6af5; --c2:#6af5c0; --c3:#f5c842;
    --c4:#f57c6a; --c5:#6ab4f5; --c6:#c06af5; --c7:#f5a06a;
    --cell: clamp(28px, 8.5vw, 42px);
    --gap: 2px; --r: 6px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    background:var(--bg); color:var(--text);
    font-family:'Segoe UI',system-ui,sans-serif;
    min-height:100dvh; display:flex; flex-direction:column;
    align-items:center; overflow:hidden;
    touch-action:none; user-select:none;
  }

  header {
    width:100%; max-width:420px;
    padding:12px 20px 6px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .logo { font-size:22px; font-weight:900; letter-spacing:3px; }
  .logo span { color:var(--accent); }
  .header-actions { display:flex; gap:8px; }
  .icon-btn {
    background:var(--surface2); border:1px solid var(--border);
    color:var(--muted); width:36px; height:36px;
    border-radius:10px; cursor:pointer;
    display:grid; place-items:center; font-size:16px;
    transition:color .15s,border-color .15s;
  }
  .icon-btn:hover { color:var(--text); border-color:var(--accent); }

  .score-bar {
    width:100%; max-width:420px;
    padding:0 20px 8px; display:flex; gap:8px;
  }
  .score-card {
    flex:1; background:var(--surface);
    border:1px solid var(--border); border-radius:12px;
    padding:6px 10px; text-align:center;
  }
  .score-label { font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-bottom:1px; }
  .score-value { font-size:20px; font-weight:800; line-height:1; }
  #score-display { color:var(--text); }
  #best-display  { color:var(--gold); }
  #level-display { color:var(--accent); }

  /* Speed bar */
  .speed-bar-wrap {
    width:100%; max-width:420px;
    padding:0 20px 6px;
    display:flex; align-items:center; gap:8px;
  }
  .speed-label { font-size:10px; color:var(--muted); letter-spacing:1px; white-space:nowrap; }
  .speed-track {
    flex:1; height:4px; background:var(--surface2);
    border-radius:4px; overflow:hidden;
  }
  .speed-fill {
    height:100%; background:var(--accent);
    border-radius:4px;
    transition:width .4s ease, background .4s;
  }

  /* Grid */
  .grid-wrap {
    padding:2px 20px 4px;
    width:100%; max-width:420px;
    display:flex; justify-content:center;
  }
  #grid {
    display:grid;
    grid-template-columns:repeat(10, var(--cell));
    grid-template-rows:   repeat(10, var(--cell));
    gap:var(--gap);
    background:var(--surface);
    border:2px solid var(--border); border-radius:14px;
    padding:8px; position:relative;
  }
  .cell {
    border-radius:var(--r);
    background:var(--surface2);
    border:1px solid var(--border);
    transition:background .06s, transform .06s;
    position:relative; overflow:hidden;
  }
  .cell.filled { border-color:transparent; }
  .cell.filled::after {
    content:''; position:absolute; inset:0;
    background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,transparent 60%);
    border-radius:inherit; pointer-events:none;
  }
  .cell.active-piece {
    border-color:transparent;
    box-shadow:0 0 8px rgba(255,255,255,.15);
  }
  .cell.ghost {
    opacity:.22; border-color:transparent;
  }
  .cell.clearing { animation:cell-clear .32s ease forwards; }
  @keyframes cell-clear {
    0%  { transform:scale(1);    opacity:1; }
    40% { transform:scale(1.12); opacity:1; }
    100%{ transform:scale(0);    opacity:0; }
  }
  .cell.flash { animation:cell-flash .18s ease; }
  @keyframes cell-flash {
    0%,100%{ filter:none; }
    50%    { filter:brightness(2.2); }
  }
  .cell.lock-flash { animation:lock-anim .15s ease; }
  @keyframes lock-anim {
    0%  { transform:scale(1.1); }
    100%{ transform:scale(1);   }
  }

  /* Controls hint */
  .controls-hint {
    width:100%; max-width:420px;
    padding:4px 20px 0;
    display:flex; gap:8px; justify-content:center;
  }
  .ctrl-btn {
    flex:1; max-width:90px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; color:var(--muted);
    font-size:18px; padding:10px 0;
    cursor:pointer; text-align:center;
    transition:background .1s, color .1s, transform .08s;
    -webkit-tap-highlight-color:transparent;
  }
  .ctrl-btn:active, .ctrl-btn.pressed {
    background:var(--surface2); color:var(--text);
    transform:scale(.94);
  }
  .ctrl-btn.drop-btn {
    background:var(--accent); color:#fff;
    border-color:var(--accent);
    font-size:14px; font-weight:700;
  }
  .ctrl-btn.drop-btn:active { background:#5a4ad4; }

  /* Next piece preview */
  .next-wrap {
    width:100%; max-width:420px;
    padding:6px 20px 4px;
    display:flex; align-items:center; gap:10px;
  }
  .next-label { font-size:10px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; }
  .next-piece-mini { display:grid; gap:2px; margin-left:8px; }
  .next-mini-cell  { width:11px; height:11px; border-radius:3px; }

  /* Overlays */
  .overlay {
    position:fixed; inset:0;
    background:rgba(10,10,20,.9);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:16px; z-index:100;
    backdrop-filter:blur(8px); padding:30px;
  }
  .overlay.hidden { display:none; }
  .overlay-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:22px; padding:28px 32px;
    text-align:center; max-width:320px; width:100%;
  }
  .overlay-title { font-size:30px; font-weight:900; letter-spacing:1px; margin-bottom:6px; }
  .overlay-sub   { color:var(--muted); font-size:14px; margin-bottom:18px; line-height:1.5; }
  .overlay-scores { display:flex; gap:10px; margin-bottom:20px; }
  .overlay-score-item {
    flex:1; background:var(--surface2); border-radius:12px; padding:10px 6px;
  }
  .overlay-score-item .label { font-size:10px; letter-spacing:1px; color:var(--muted); margin-bottom:3px; }
  .overlay-score-item .val   { font-size:24px; font-weight:800; }
  .btn {
    display:block; width:100%; padding:13px;
    border-radius:14px; border:none;
    font-size:15px; font-weight:700; letter-spacing:.5px;
    cursor:pointer; transition:transform .1s;
  }
  .btn:active { transform:scale(.97); }
  .btn-primary   { background:var(--accent); color:#fff; margin-bottom:8px; }
  .btn-secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border); margin-bottom:8px; }

  /* Toast */
  #toast {
    position:fixed; top:68px; left:50%;
    transform:translateX(-50%) translateY(-14px);
    background:var(--surface2); border:1px solid var(--accent);
    color:var(--text); padding:9px 18px;
    border-radius:30px; font-size:13px; font-weight:600;
    white-space:nowrap; opacity:0; pointer-events:none;
    z-index:200; transition:opacity .2s, transform .2s;
    box-shadow:0 4px 20px rgba(124,106,245,.3);
  }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* Score popup */
  .score-popup {
    position:absolute; pointer-events:none;
    font-size:18px; font-weight:900; color:var(--gold);
    text-shadow:0 2px 8px rgba(0,0,0,.6);
    animation:popup-rise .8s ease forwards; z-index:50; white-space:nowrap;
  }
  @keyframes popup-rise {
    0%  { opacity:1; transform:translateY(0) scale(1); }
    100%{ opacity:0; transform:translateY(-48px) scale(1.15); }
  }

  /* Particles */
  .particle {
    position:absolute; width:6px; height:6px;
    border-radius:50%; pointer-events:none;
    animation:particle-fly .55s ease forwards;
  }
  @keyframes particle-fly {
    0%  { opacity:1; transform:translate(0,0) scale(1); }
    100%{ opacity:0; transform:translate(var(--tx),var(--ty)) scale(0); }
  }

  /* Row flash overlay */
  .row-flash {
    position:absolute; left:8px; right:8px; height:var(--cell);
    background:rgba(255,255,255,.13); border-radius:6px;
    pointer-events:none; animation:row-flash-anim .32s ease forwards; z-index:10;
  }
  @keyframes row-flash-anim { 0%{opacity:1} 100%{opacity:0} }

  /* Achievement dots */
  #achievements-bar {
    width:100%; max-width:420px;
    padding:0 20px 4px; display:flex; gap:6px; justify-content:center;
  }
  .ach-dot {
    width:8px; height:8px; border-radius:50%;
    background:var(--surface2); border:1.5px solid var(--border);
    transition:background .3s, border-color .3s;
  }
  .ach-dot.unlocked {
    background:var(--accent); border-color:var(--accent);
    box-shadow:0 0 8px rgba(124,106,245,.5);
  }

  /* Swipe zone (invisible overlay on grid for swipe detection) */
  #swipe-zone {
    position:absolute; inset:0; z-index:20; cursor:pointer;
  }
</style>
</head>
<body>

<header>
  <div class="logo">BL<span>O</span>X</div>
  <div class="header-actions">
    <button class="icon-btn" id="pause-btn" title="Pause">⏸</button>
  </div>
</header>

<div class="score-bar">
  <div class="score-card">
    <div class="score-label">Score</div>
    <div class="score-value" id="score-display">0</div>
  </div>
  <div class="score-card">
    <div class="score-label">Best</div>
    <div class="score-value" id="best-display">0</div>
  </div>
  <div class="score-card">
    <div class="score-label">Level</div>
    <div class="score-value" id="level-display">1</div>
  </div>
</div>

<div class="speed-bar-wrap">
  <span class="speed-label">SPEED</span>
  <div class="speed-track"><div class="speed-fill" id="speed-fill" style="width:5%"></div></div>
</div>

<div class="next-wrap">
  <span class="next-label">Next</span>
  <div id="next-preview"></div>
</div>

<div id="achievements-bar"></div>

<div class="grid-wrap">
  <div id="grid">
    <div id="swipe-zone"></div>
  </div>
</div>

<div class="controls-hint">
  <button class="ctrl-btn" id="btn-left">◀</button>
  <button class="ctrl-btn drop-btn" id="btn-drop">DROP ▼</button>
  <button class="ctrl-btn" id="btn-right">▶</button>
</div>

<!-- Overlays -->
<div class="overlay" id="start-overlay">
  <div class="overlay-card">
    <div class="overlay-title">BLOX</div>
    <div class="overlay-sub">Pieces fall from above.<br>Steer left/right · Drop to lock · Clear lines to score!</div>
    <button class="btn btn-primary" id="start-btn">▶ Play Now</button>
    <button class="btn btn-secondary" id="start-daily-btn">📅 Daily Challenge</button>
  </div>
</div>

<div class="overlay hidden" id="pause-overlay">
  <div class="overlay-card">
    <div class="overlay-title">Paused</div>
    <div class="overlay-sub">Take a breath ✨</div>
    <button class="btn btn-primary" id="resume-btn">Resume</button>
    <button class="btn btn-secondary" id="restart-from-pause-btn">Restart</button>
  </div>
</div>

<div class="overlay hidden" id="gameover-overlay">
  <div class="overlay-card">
    <div class="overlay-title">Game Over</div>
    <div class="overlay-sub">The board is full — great run!</div>
    <div class="overlay-scores" id="gameover-scores"></div>
    <button class="btn btn-primary" id="play-again-btn">Play Again</button>
    <button class="btn btn-secondary" id="gameover-daily-btn">📅 Daily Challenge</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════
//  BLOX — Falling Block Puzzle
// ═══════════════════════════════════════════
const ROWS = 10, COLS = 10;
const COLORS = ['#7c6af5','#6af5c0','#f5c842','#f57c6a','#6ab4f5','#c06af5','#f5a06a'];

// Piece shapes — [row, col] offsets
const PIECE_DEFS = [
  { cells:[[0,0]], tier:0 },
  { cells:[[0,0],[0,1]], tier:0 },
  { cells:[[0,0],[1,0]], tier:0 },
  { cells:[[0,0],[0,1],[0,2]], tier:1 },
  { cells:[[0,0],[1,0],[2,0]], tier:1 },
  { cells:[[0,0],[0,1],[1,0]], tier:1 },
  { cells:[[0,0],[0,1],[1,1]], tier:1 },
  { cells:[[0,0],[1,0],[1,1]], tier:1 },
  { cells:[[0,1],[1,0],[1,1]], tier:1 },
  { cells:[[0,0],[0,1],[0,2],[0,3]], tier:2 },
  { cells:[[0,0],[1,0],[2,0],[3,0]], tier:2 },
  { cells:[[0,0],[0,1],[1,0],[1,1]], tier:2 },
  { cells:[[0,0],[0,1],[0,2],[1,0]], tier:2 },
  { cells:[[0,0],[0,1],[0,2],[1,2]], tier:2 },
  { cells:[[0,0],[1,0],[2,0],[2,1]], tier:2 },
  { cells:[[0,1],[1,1],[2,0],[2,1]], tier:2 },
  { cells:[[0,0],[0,1],[1,1],[1,2]], tier:2 },
  { cells:[[0,1],[0,2],[1,0],[1,1]], tier:2 },
  { cells:[[0,0],[0,1],[0,2],[1,0],[1,1]], tier:3 },
  { cells:[[0,0],[1,0],[2,0],[3,0],[4,0]], tier:3 },
  { cells:[[0,0],[0,1],[0,2],[0,3],[0,4]], tier:3 },
  { cells:[[0,0],[0,1],[0,2],[1,2],[2,2]], tier:3 },
  { cells:[[0,0],[1,0],[1,1],[2,1],[2,2]], tier:3 },
];

const ACHIEVEMENTS = [
  { id:'first_clear',  label:'First Clear!',   test:s=>s.totalClears>=1     },
  { id:'level_3',      label:'Level 3',         test:s=>s.level>=3           },
  { id:'level_5',      label:'Level 5 🔥',      test:s=>s.level>=5           },
  { id:'score_500',    label:'500 Points',       test:s=>s.score>=500         },
  { id:'score_2000',   label:'2000 Points',      test:s=>s.score>=2000        },
  { id:'score_5000',   label:'5000 Points 🏆',   test:s=>s.score>=5000        },
  { id:'combo_3',      label:'3× Combo!',        test:s=>s.maxCombo>=3        },
  { id:'speed_demon',  label:'Speed Demon ⚡',   test:s=>s.level>=8           },
];

// ── Storage
const LS_BEST = 'blox2_best', LS_ACH = 'blox2_ach', LS_DAILY = 'blox2_daily';
const getBest  = ()=> parseInt(localStorage.getItem(LS_BEST)||'0');
const saveBest = v => localStorage.setItem(LS_BEST, v);
const getAchs  = ()=> JSON.parse(localStorage.getItem(LS_ACH)||'[]');
const saveAchs = a => localStorage.setItem(LS_ACH, JSON.stringify(a));
const getDailyData = ()=>{ try{ return JSON.parse(localStorage.getItem(LS_DAILY)||'null'); }catch{ return null; } };
const saveDailyData= d=> localStorage.setItem(LS_DAILY, JSON.stringify(d));

// ── RNG
function makeRng(seed) {
  let s = seed>>>0;
  return ()=>{ s|=0; s=s+0x6D2B79F5|0; let t=Math.imul(s^s>>>15,1|s); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; };
}
function randItem(rng,arr){ return arr[Math.floor(rng()*arr.length)]; }
function randInt(rng,a,b){ return Math.floor(rng()*(b-a+1))+a; }
function getDailySeed(){ const d=new Date(); return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate(); }

// ── State
let board, activePiece, nextPieceDef, nextColor;
let state, paused, dropTimer, dailyMode, rng;

function freshBoard(){ return Array.from({length:ROWS},()=>Array(COLS).fill(null)); }

// ── Level / Speed config
// dropInterval in ms; starts slow, gets brutal
function dropInterval(level){
  // Level 1 = 1400ms … Level 10 = 250ms, asymptotic
  return Math.max(220, 1400 - (level-1)*130);
}
function getLevel(score){
  return Math.min(10, 1 + Math.floor(score/300));
}
function getAvailableDefs(level){
  const maxTier = level<=2?1 : level<=4?2 : level<=6?3 : 3;
  return PIECE_DEFS.filter(d=>d.tier<=maxTier);
}

// ── Piece helpers
function pieceWidth(def){ return Math.max(...def.cells.map(c=>c[1]))+1; }
function pieceHeight(def){ return Math.max(...def.cells.map(c=>c[0]))+1; }

function spawnPiece(){
  const def = nextPieceDef;
  const color = nextColor;
  const w = pieceWidth(def);
  const col = Math.floor((COLS-w)/2);
  activePiece = { def, color, row:0, col };
  prepareNext();
  renderNextPreview();

  // Check if spawn position is blocked → game over
  if(!canFit(def, 0, col)){
    endGame(); return false;
  }
  return true;
}

function prepareNext(){
  const defs = getAvailableDefs(state.level);
  nextPieceDef = randItem(rng, defs);
  nextColor     = randItem(rng, COLORS);
}

// ── Board logic
function canFit(def, row, col){
  for(const [dr,dc] of def.cells){
    const r=row+dr, c=col+dc;
    if(r<0||r>=ROWS||c<0||c>=COLS) return false;
    if(board[r][c]) return false;
  }
  return true;
}

function lockPiece(){
  const {def,color,row,col}=activePiece;
  for(const [dr,dc] of def.cells) board[row+dr][col+dc]=color;

  // Flash locked cells
  def.cells.forEach(([dr,dc])=>{
    const el=getCellEl(row+dr,col+dc);
    el.classList.add('lock-flash');
    setTimeout(()=>el.classList.remove('lock-flash'),200);
  });

  activePiece=null;
  processClears();
}

function processClears(){
  const rows=[], cols=[];
  for(let r=0;r<ROWS;r++) if(board[r].every(c=>c!==null)) rows.push(r);
  for(let c=0;c<COLS;c++) if(board.map(row=>row[c]).every(v=>v!==null)) cols.push(c);
  const linesCount = rows.length+cols.length;

  if(linesCount>0){
    state.combo=(state.combo||0)+1;
    state.maxCombo=Math.max(state.maxCombo||0,state.combo);
    state.totalClears=(state.totalClears||0)+linesCount;

    // Visual: flash overlay bars
    const cellPx = getCellPx();
    rows.forEach(r=>{
      const fl=document.createElement('div');
      fl.className='row-flash';
      fl.style.top=(8+r*(cellPx+2))+'px';
      gridEl.appendChild(fl);
      setTimeout(()=>fl.remove(),380);
    });
    cols.forEach(c=>{
      const fl=document.createElement('div');
      fl.className='row-flash';
      fl.style.cssText=`top:8px;bottom:8px;height:auto;left:${8+c*(cellPx+2)}px;width:${cellPx}px;`;
      gridEl.appendChild(fl);
      setTimeout(()=>fl.remove(),380);
    });

    // Collect cells
    const cleared=new Set();
    rows.forEach(r=>{ for(let c=0;c<COLS;c++) cleared.add(r*COLS+c); });
    cols.forEach(c=>{ for(let r=0;r<ROWS;r++) cleared.add(r*COLS+c); });

    cleared.forEach(idx=>{
      const el=gridEl.children[idx+1]; // +1 for swipe-zone
      el.classList.add('clearing');
      spawnParticles(el);
    });

    setTimeout(()=>{
      rows.forEach(r=>{ for(let c=0;c<COLS;c++) board[r][c]=null; });
      cols.forEach(c=>{ for(let r=0;r<ROWS;r++) board[r][c]=null; });
      cleared.forEach(idx=>{ const el=gridEl.children[idx+1]; el.classList.remove('clearing'); });

      const pts = linesCount*50 + (state.combo>1 ? Math.round(linesCount*50*(state.combo*.5)) : 0);
      state.score+=pts;

      const newLevel=getLevel(state.score);
      if(newLevel>state.level){
        state.level=newLevel;
        showToast('⚡ Level '+state.level+'!');
        restartDropTimer();
      }

      showScorePopup(pts, state.combo);
      updateBest();
      checkAchievements();
      updateScoreUI();
      renderBoard();
      if(!spawnPiece()) return;
      renderBoard();
    }, 370);

  } else {
    state.combo=0;
    updateScoreUI();
    renderBoard();
    spawnPiece();
    renderBoard();
  }
}

// ── Drop tick
function tick(){
  if(paused||!activePiece) return;
  const {def,row,col}=activePiece;
  if(canFit(def,row+1,col)){
    activePiece.row++;
    renderBoard();
  } else {
    lockPiece();
  }
}

function restartDropTimer(){
  clearInterval(dropTimer);
  if(!paused) dropTimer=setInterval(tick, dropInterval(state.level));
}

// ── Move controls
function moveLeft(){
  if(!activePiece||paused) return;
  if(canFit(activePiece.def,activePiece.row,activePiece.col-1)){
    activePiece.col--;
    renderBoard();
  }
}
function moveRight(){
  if(!activePiece||paused) return;
  if(canFit(activePiece.def,activePiece.row,activePiece.col+1)){
    activePiece.col++;
    renderBoard();
  }
}
function hardDrop(){
  if(!activePiece||paused) return;
  // Find lowest row
  let r=activePiece.row;
  while(canFit(activePiece.def,r+1,activePiece.col)) r++;
  state.score+=Math.max(0,(r-activePiece.row)); // bonus pts per cell dropped
  activePiece.row=r;
  renderBoard();
  clearInterval(dropTimer);
  lockPiece();
  if(!paused) dropTimer=setInterval(tick,dropInterval(state.level));
}

// ── Render
const gridEl  = document.getElementById('grid');
const toastEl = document.getElementById('toast');
const scoreEl = document.getElementById('score-display');
const bestEl  = document.getElementById('best-display');
const levelEl = document.getElementById('level-display');
const speedFill= document.getElementById('speed-fill');
const achBar  = document.getElementById('achievements-bar');

function getCellEl(r,c){ return gridEl.children[r*COLS+c+1]; } // +1 for swipe-zone
function getCellPx(){
  const style=getComputedStyle(document.documentElement);
  return parseInt(style.getPropertyValue('--cell'))||38;
}

function buildGrid(){
  // Keep swipe-zone (first child), remove rest
  while(gridEl.children.length>1) gridEl.removeChild(gridEl.lastChild);
  for(let i=0;i<ROWS*COLS;i++){
    const c=document.createElement('div');
    c.className='cell'; gridEl.appendChild(c);
  }
}

// Compute ghost position
function ghostRow(){
  if(!activePiece) return -1;
  let r=activePiece.row;
  while(canFit(activePiece.def,r+1,activePiece.col)) r++;
  return r;
}

function renderBoard(){
  // Reset all cells
  for(let i=0;i<ROWS*COLS;i++){
    const el=gridEl.children[i+1];
    const r=Math.floor(i/COLS), c=i%COLS;
    const color=board[r][c];
    if(color){
      el.style.background=color;
      el.classList.add('filled');
      el.classList.remove('active-piece','ghost');
    } else {
      el.style.background='';
      el.classList.remove('filled','active-piece','ghost');
    }
  }

  if(!activePiece) return;

  // Ghost
  const gr=ghostRow();
  if(gr!==activePiece.row){
    activePiece.def.cells.forEach(([dr,dc])=>{
      const r=gr+dr, c=activePiece.col+dc;
      if(r>=0&&r<ROWS&&c>=0&&c<COLS){
        const el=getCellEl(r,c);
        if(!board[r][c]){
          el.style.background=activePiece.color;
          el.classList.add('ghost');
        }
      }
    });
  }

  // Active piece
  activePiece.def.cells.forEach(([dr,dc])=>{
    const r=activePiece.row+dr, c=activePiece.col+dc;
    if(r>=0&&r<ROWS&&c>=0&&c<COLS){
      const el=getCellEl(r,c);
      el.style.background=activePiece.color;
      el.classList.remove('filled','ghost');
      el.classList.add('active-piece');
    }
  });
}

function renderNextPreview(){
  const wrap=document.getElementById('next-preview');
  wrap.innerHTML='';
  if(!nextPieceDef) return;
  const cells=nextPieceDef.cells;
  const maxR=Math.max(...cells.map(c=>c[0]));
  const maxC=Math.max(...cells.map(c=>c[1]));
  const mini=document.createElement('div');
  mini.className='next-piece-mini';
  mini.style.gridTemplateColumns=`repeat(${maxC+1},11px)`;
  mini.style.gridTemplateRows=`repeat(${maxR+1},11px)`;
  const g=Array.from({length:maxR+1},()=>Array(maxC+1).fill(false));
  cells.forEach(([r,c])=>g[r][c]=true);
  g.forEach(row=>row.forEach(f=>{
    const mc=document.createElement('div');
    mc.className='next-mini-cell';
    mc.style.background=f?nextColor:'transparent';
    mini.appendChild(mc);
  }));
  wrap.appendChild(mini);
}

// ── Score UI
function updateScoreUI(){
  scoreEl.textContent=state.score.toLocaleString();
  bestEl.textContent =getBest().toLocaleString();
  levelEl.textContent=state.level;
  // Speed bar: level 1-10 → 5%-100%
  const pct=Math.round(5+(state.level-1)*10.5);
  speedFill.style.width=pct+'%';
  speedFill.style.background=state.level>=7?'var(--accent2)':state.level>=4?'var(--gold)':'var(--accent)';
}

function updateBest(){ if(state.score>getBest()) saveBest(state.score); }

// ── Particles
function spawnParticles(cellEl){
  const rect=cellEl.getBoundingClientRect();
  const gr=gridEl.getBoundingClientRect();
  const cx=rect.left-gr.left+rect.width/2;
  const cy=rect.top-gr.top+rect.height/2;
  const color=cellEl.style.background||'#7c6af5';
  for(let i=0;i<5;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.cssText=`left:${cx-3}px;top:${cy-3}px;background:${color};--tx:${(Math.random()-.5)*55}px;--ty:${(Math.random()-.5)*55}px;`;
    gridEl.appendChild(p);
    setTimeout(()=>p.remove(),650);
  }
}

// ── Score popup
function showScorePopup(pts,combo){
  const pop=document.createElement('div');
  pop.className='score-popup';
  pop.textContent='+'+pts+(combo>1?` ×${combo}`:'');
  const gr=gridEl.getBoundingClientRect();
  const br=document.body.getBoundingClientRect();
  pop.style.left=(gr.left-br.left+gr.width/2)+'px';
  pop.style.top=(gr.top-br.top+gr.height/2)+'px';
  pop.style.transform='translateX(-50%)';
  document.body.appendChild(pop);
  setTimeout(()=>pop.remove(),850);
}

// ── Achievements
function buildAchBar(){
  achBar.innerHTML='';
  const ul=getAchs();
  ACHIEVEMENTS.forEach(a=>{
    const d=document.createElement('div');
    d.className='ach-dot'+(ul.includes(a.id)?' unlocked':'');
    d.title=a.label;
    achBar.appendChild(d);
  });
}
function checkAchievements(){
  const ul=getAchs(); let ch=false;
  ACHIEVEMENTS.forEach(a=>{
    if(!ul.includes(a.id)&&a.test(state)){ ul.push(a.id); ch=true; showToast('🏆 '+a.label); }
  });
  if(ch){ saveAchs(ul); buildAchBar(); }
}

// ── Toast
let toastTimer;
function showToast(msg){
  clearTimeout(toastTimer);
  toastEl.textContent=msg; toastEl.classList.add('show');
  toastTimer=setTimeout(()=>toastEl.classList.remove('show'),2200);
}

// ── Overlays
function showOverlay(id){ document.getElementById(id).classList.remove('hidden'); }
function hideOverlay(id){ document.getElementById(id).classList.add('hidden'); }

function endGame(){
  clearInterval(dropTimer);
  if(dailyMode) saveDailyData({seed:getDailySeed(),score:state.score,date:new Date().toDateString()});
  const best=getBest();
  document.getElementById('gameover-scores').innerHTML=`
    <div class="overlay-score-item"><div class="label">SCORE</div><div class="val">${state.score.toLocaleString()}</div></div>
    <div class="overlay-score-item"><div class="label">BEST</div><div class="val" style="color:var(--gold)">${best.toLocaleString()}</div></div>
    <div class="overlay-score-item"><div class="label">LEVEL</div><div class="val" style="color:var(--accent)">${state.level}</div></div>
  `;
  setTimeout(()=>showOverlay('gameover-overlay'),400);
}

// ── Init
function initGame(daily=false){
  clearInterval(dropTimer);
  dailyMode=daily;
  const seed=daily?getDailySeed():Math.floor(Math.random()*1e9);
  rng=makeRng(seed);
  board=freshBoard();
  state={ score:0, level:1, combo:0, maxCombo:0, totalClears:0 };
  paused=false; activePiece=null;

  prepareNext();
  renderNextPreview();
  buildGrid();
  renderBoard();
  updateScoreUI();
  buildAchBar();

  hideOverlay('start-overlay');
  hideOverlay('pause-overlay');
  hideOverlay('gameover-overlay');

  // Slight delay so overlay hides smoothly before pieces start
  setTimeout(()=>{
    spawnPiece();
    renderBoard();
    dropTimer=setInterval(tick,dropInterval(1));
  },300);
}

// ── Touch / Swipe on grid
let touchStartX=0, touchStartY=0, touchMoved=false;
const swipeZone=document.getElementById('swipe-zone');

swipeZone.addEventListener('touchstart',e=>{
  touchStartX=e.touches[0].clientX;
  touchStartY=e.touches[0].clientY;
  touchMoved=false;
},{ passive:true });

swipeZone.addEventListener('touchmove',e=>{
  const dx=e.touches[0].clientX-touchStartX;
  const dy=e.touches[0].clientY-touchStartY;
  if(Math.abs(dx)>18&&!touchMoved){
    touchMoved=true;
    if(dx<0) moveLeft(); else moveRight();
    touchStartX=e.touches[0].clientX; // allow continuous swipe
  }
  if(dy>40&&!touchMoved){ touchMoved=true; hardDrop(); }
},{ passive:true });

swipeZone.addEventListener('touchend',e=>{
  if(!touchMoved){ /* tap = hard drop */ hardDrop(); }
});

// ── Button controls
document.getElementById('btn-left').addEventListener('pointerdown', e=>{ e.preventDefault(); moveLeft(); });
document.getElementById('btn-right').addEventListener('pointerdown',e=>{ e.preventDefault(); moveRight(); });
document.getElementById('btn-drop').addEventListener('pointerdown', e=>{ e.preventDefault(); hardDrop(); });

// Hold left/right
let holdInterval=null;
['btn-left','btn-right'].forEach(id=>{
  const btn=document.getElementById(id);
  const fn=id==='btn-left'?moveLeft:moveRight;
  btn.addEventListener('pointerdown',()=>{
    btn.classList.add('pressed');
    clearInterval(holdInterval);
    holdInterval=setInterval(fn,130);
  });
  ['pointerup','pointerleave','pointercancel'].forEach(ev=>
    btn.addEventListener(ev,()=>{ btn.classList.remove('pressed'); clearInterval(holdInterval); })
  );
});

// ── Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a')  { e.preventDefault(); moveLeft();  }
  if(e.key==='ArrowRight'||e.key==='d') { e.preventDefault(); moveRight(); }
  if(e.key==='ArrowDown'||e.key==='s'||e.key===' ') { e.preventDefault(); hardDrop(); }
  if(e.key==='Escape'||e.key==='p') document.getElementById('pause-btn').click();
});

// ── Pause
document.getElementById('pause-btn').onclick=()=>{
  if(!activePiece&&!board.flat().some(Boolean)) return;
  paused=!paused;
  if(paused){ clearInterval(dropTimer); showOverlay('pause-overlay'); }
  else { hideOverlay('pause-overlay'); dropTimer=setInterval(tick,dropInterval(state.level)); }
};
document.getElementById('resume-btn').onclick=()=>{
  paused=false; hideOverlay('pause-overlay');
  dropTimer=setInterval(tick,dropInterval(state.level));
};
document.getElementById('restart-from-pause-btn').onclick=()=>initGame(dailyMode);

// ── Start / Game over buttons
document.getElementById('start-btn').onclick=()=>initGame(false);
document.getElementById('start-daily-btn').onclick=()=>{
  const d=getDailyData();
  if(d&&d.date===new Date().toDateString()){ showToast('Already played today! 📅'); return; }
  initGame(true);
};
document.getElementById('play-again-btn').onclick=()=>initGame(false);
document.getElementById('gameover-daily-btn').onclick=()=>{
  const d=getDailyData();
  if(d&&d.date===new Date().toDateString()){ showToast('Already played today! 📅'); hideOverlay('gameover-overlay'); return; }
  initGame(true);
};

// ── Boot
bestEl.textContent=getBest().toLocaleString();
buildAchBar();
showOverlay('start-overlay');
buildGrid();
</script>
</body>
</html>
