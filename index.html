<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BLOX — Block Puzzle</title>
<style>
  /* ── Design Tokens ── */
  :root {
    --bg:        #0f0f1a;
    --surface:   #1a1a2e;
    --surface2:  #252540;
    --border:    #2e2e50;
    --text:      #e8e8f4;
    --muted:     #6b6b9a;
    --accent:    #7c6af5;
    --accent2:   #f57c6a;
    --gold:      #f5c842;

    /* Piece colours */
    --c1: #7c6af5; /* violet */
    --c2: #6af5c0; /* mint */
    --c3: #f5c842; /* gold */
    --c4: #f57c6a; /* coral */
    --c5: #6ab4f5; /* sky */
    --c6: #c06af5; /* purple */
    --c7: #f5a06a; /* peach */

    --cell: clamp(30px, 8.5vw, 44px);
    --gap:  2px;
    --r:    6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    touch-action: none;
    user-select: none;
  }

  /* ── Header ── */
  header {
    width: 100%;
    max-width: 420px;
    padding: 14px 20px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 3px;
    color: var(--text);
  }
  .logo span { color: var(--accent); }
  .header-actions { display: flex; gap: 8px; }
  .icon-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 36px; height: 36px;
    border-radius: 10px;
    cursor: pointer;
    display: grid; place-items: center;
    font-size: 16px;
    transition: color .15s, border-color .15s;
  }
  .icon-btn:hover { color: var(--text); border-color: var(--accent); }

  /* ── Score Bar ── */
  .score-bar {
    width: 100%;
    max-width: 420px;
    padding: 0 20px 10px;
    display: flex;
    gap: 10px;
  }
  .score-card {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px 12px;
    text-align: center;
  }
  .score-label {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .score-value {
    font-size: 22px;
    font-weight: 800;
    line-height: 1;
    transition: color .2s;
  }
  #score-display { color: var(--text); }
  #best-display  { color: var(--gold); }
  #streak-display { color: var(--accent2); }

  /* Streak pulse */
  .streak-active .score-value { animation: pulse-score .3s ease; }
  @keyframes pulse-score {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.25); }
    100% { transform: scale(1); }
  }

  /* ── Grid ── */
  .grid-wrap {
    padding: 4px 20px;
    width: 100%;
    max-width: 420px;
    display: flex;
    justify-content: center;
  }
  #grid {
    display: grid;
    grid-template-columns: repeat(10, var(--cell));
    grid-template-rows:    repeat(10, var(--cell));
    gap: var(--gap);
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 8px;
    position: relative;
  }
  .cell {
    border-radius: var(--r);
    background: var(--surface2);
    border: 1px solid var(--border);
    transition: background .08s, transform .08s, box-shadow .08s;
    position: relative;
    overflow: hidden;
  }
  .cell.filled {
    border-color: transparent;
  }
  .cell.filled::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,.18) 0%, transparent 60%);
    border-radius: inherit;
    pointer-events: none;
  }
  .cell.preview {
    opacity: .5;
    transform: scale(.92);
  }
  .cell.preview-invalid {
    background: rgba(245,100,100,.3) !important;
    opacity: .6;
    transform: scale(.88);
  }
  .cell.clearing {
    animation: cell-clear .35s ease forwards;
  }
  @keyframes cell-clear {
    0%   { transform: scale(1);    opacity: 1; }
    40%  { transform: scale(1.12); opacity: 1; }
    100% { transform: scale(0);    opacity: 0; }
  }
  .cell.flash {
    animation: cell-flash .2s ease;
  }
  @keyframes cell-flash {
    0%,100% { filter: none; }
    50%      { filter: brightness(2); }
  }

  /* ── Piece Tray ── */
  .tray {
    width: 100%;
    max-width: 420px;
    padding: 10px 20px 14px;
    display: flex;
    justify-content: space-around;
    align-items: flex-end;
    gap: 8px;
    min-height: 110px;
  }
  .piece-slot {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    cursor: pointer;
    min-height: 100px;
    border-radius: 14px;
    border: 2px solid transparent;
    background: var(--surface);
    padding: 8px 4px;
    transition: border-color .15s, background .15s, transform .1s;
    position: relative;
  }
  .piece-slot:hover { background: var(--surface2); }
  .piece-slot.selected {
    border-color: var(--accent);
    background: var(--surface2);
    box-shadow: 0 0 18px rgba(124,106,245,.35);
    transform: translateY(-4px);
  }
  .piece-slot.used { opacity: .3; pointer-events: none; }

  .piece-mini {
    display: grid;
    gap: 2px;
  }
  .piece-mini-cell {
    width: 12px; height: 12px;
    border-radius: 3px;
  }

  /* ── Overlays ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(10,10,20,.88);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px;
    z-index: 100;
    backdrop-filter: blur(6px);
    padding: 30px;
  }
  .overlay.hidden { display: none; }

  .overlay-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 32px 36px;
    text-align: center;
    max-width: 320px;
    width: 100%;
  }
  .overlay-title {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .overlay-sub {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 20px;
  }
  .overlay-scores {
    display: flex; gap: 12px;
    margin-bottom: 22px;
  }
  .overlay-score-item {
    flex: 1;
    background: var(--surface2);
    border-radius: 12px;
    padding: 12px 8px;
  }
  .overlay-score-item .label { font-size: 10px; letter-spacing: 1px; color: var(--muted); margin-bottom: 4px; }
  .overlay-score-item .val   { font-size: 26px; font-weight: 800; }

  .btn {
    display: block; width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: .5px;
    cursor: pointer;
    transition: transform .1s, opacity .15s;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--accent); color: #fff; margin-bottom: 10px; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

  /* Achievement toast */
  #toast {
    position: fixed;
    top: 70px; left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--surface2);
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    z-index: 200;
    transition: opacity .25s, transform .25s;
    box-shadow: 0 4px 24px rgba(124,106,245,.3);
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Score popup */
  .score-popup {
    position: absolute;
    pointer-events: none;
    font-size: 18px;
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 2px 8px rgba(0,0,0,.6);
    animation: popup-rise .8s ease forwards;
    z-index: 50;
    white-space: nowrap;
  }
  @keyframes popup-rise {
    0%   { opacity: 1;   transform: translateY(0) scale(1); }
    100% { opacity: 0;   transform: translateY(-50px) scale(1.2); }
  }

  /* Particles */
  .particle {
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    pointer-events: none;
    animation: particle-fly .6s ease forwards;
  }
  @keyframes particle-fly {
    0%   { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
  }

  /* Line clear row flash */
  .row-flash {
    position: absolute;
    left: 8px; right: 8px;
    height: var(--cell);
    background: rgba(255,255,255,.15);
    border-radius: 6px;
    pointer-events: none;
    animation: row-flash-anim .35s ease forwards;
    z-index: 10;
  }
  @keyframes row-flash-anim {
    0%   { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Daily challenge badge */
  .daily-badge {
    position: absolute;
    top: 6px; right: 6px;
    background: var(--gold);
    color: #1a1a2e;
    font-size: 9px;
    font-weight: 900;
    letter-spacing: 1px;
    padding: 2px 6px;
    border-radius: 10px;
  }

  /* Progress dots (achievements) */
  #achievements-bar {
    width: 100%;
    max-width: 420px;
    padding: 0 20px 8px;
    display: flex;
    gap: 6px;
    justify-content: center;
  }
  .ach-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    transition: background .3s, border-color .3s;
  }
  .ach-dot.unlocked {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 8px rgba(124,106,245,.5);
  }
</style>
</head>
<body>

<header>
  <div class="logo">BL<span>O</span>X</div>
  <div class="header-actions">
    <button class="icon-btn" id="daily-btn" title="Daily Challenge">📅</button>
    <button class="icon-btn" id="pause-btn" title="Pause">⏸</button>
  </div>
</header>

<div class="score-bar">
  <div class="score-card">
    <div class="score-label">Score</div>
    <div class="score-value" id="score-display">0</div>
  </div>
  <div class="score-card">
    <div class="score-label">Best</div>
    <div class="score-value" id="best-display">0</div>
  </div>
  <div class="score-card" id="streak-card">
    <div class="score-label">Streak 🔥</div>
    <div class="score-value" id="streak-display">0</div>
  </div>
</div>

<div id="achievements-bar"></div>

<div class="grid-wrap">
  <div id="grid"></div>
</div>

<div class="tray" id="tray"></div>

<!-- Overlays -->
<div class="overlay" id="start-overlay">
  <div class="overlay-card">
    <div class="overlay-title">BLOX</div>
    <div class="overlay-sub">Place pieces · Clear lines · Go infinite</div>
    <button class="btn btn-primary" id="start-btn">Play Now</button>
    <button class="btn btn-secondary" id="start-daily-btn">📅 Daily Challenge</button>
  </div>
</div>

<div class="overlay hidden" id="pause-overlay">
  <div class="overlay-card">
    <div class="overlay-title">Paused</div>
    <div class="overlay-sub">Take a breather ✨</div>
    <button class="btn btn-primary" id="resume-btn">Resume</button>
    <button class="btn btn-secondary" id="restart-from-pause-btn">Restart</button>
  </div>
</div>

<div class="overlay hidden" id="gameover-overlay">
  <div class="overlay-card">
    <div class="overlay-title">Game Over</div>
    <div class="overlay-sub">No moves left — nice run!</div>
    <div class="overlay-scores" id="gameover-scores"></div>
    <button class="btn btn-primary" id="play-again-btn">Play Again</button>
    <button class="btn btn-secondary" id="gameover-daily-btn">📅 Daily Challenge</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
//  BLOX — Block Puzzle  |  Complete Game Logic
// ═══════════════════════════════════════════════════════

const ROWS = 10, COLS = 10;
const COLORS = ['var(--c1)','var(--c2)','var(--c3)','var(--c4)','var(--c5)','var(--c6)','var(--c7)'];

// ── Piece definitions [shape, colorIndex]
const PIECE_DEFS = [
  // Singles & dominoes
  { cells: [[0,0]], size: 1 },
  { cells: [[0,0],[0,1]], size: 1 },
  { cells: [[0,0],[1,0]], size: 1 },
  // Triominoes
  { cells: [[0,0],[0,1],[0,2]], size: 2 },
  { cells: [[0,0],[1,0],[2,0]], size: 2 },
  { cells: [[0,0],[0,1],[1,0]], size: 2 },
  { cells: [[0,0],[0,1],[1,1]], size: 2 },
  { cells: [[0,0],[1,0],[1,1]], size: 2 },
  { cells: [[0,1],[1,0],[1,1]], size: 2 },
  // Tetrominoes
  { cells: [[0,0],[0,1],[0,2],[0,3]], size: 3 },
  { cells: [[0,0],[1,0],[2,0],[3,0]], size: 3 },
  { cells: [[0,0],[0,1],[1,0],[1,1]], size: 3 },
  { cells: [[0,0],[0,1],[0,2],[1,0]], size: 3 },
  { cells: [[0,0],[0,1],[0,2],[1,2]], size: 3 },
  { cells: [[0,0],[1,0],[2,0],[2,1]], size: 3 },
  { cells: [[0,1],[1,1],[2,0],[2,1]], size: 3 },
  { cells: [[0,0],[0,1],[1,1],[1,2]], size: 3 },
  { cells: [[0,1],[0,2],[1,0],[1,1]], size: 3 },
  // Pentominoes (harder)
  { cells: [[0,0],[0,1],[0,2],[1,0],[1,1]], size: 4 },
  { cells: [[0,0],[1,0],[2,0],[3,0],[4,0]], size: 4 },
  { cells: [[0,0],[0,1],[0,2],[0,3],[0,4]], size: 4 },
  { cells: [[0,0],[0,1],[0,2],[1,2],[2,2]], size: 4 },
  { cells: [[0,0],[1,0],[1,1],[2,1],[2,2]], size: 4 },
  { cells: [[0,2],[1,0],[1,1],[1,2],[2,0]], size: 4 },
  { cells: [[0,0],[0,1],[0,2],[0,3],[1,0]], size: 4 },
];

// ── Achievements
const ACHIEVEMENTS = [
  { id:'first_clear',  label:'First Clear!',     desc:'Clear your first line',            test: s => s.totalClears >= 1       },
  { id:'combo_2',      label:'Combo ×2!',        desc:'Reach a 2× combo',                test: s => s.maxCombo  >= 2         },
  { id:'combo_5',      label:'Combo ×5!',        desc:'Reach a 5× combo',                test: s => s.maxCombo  >= 5         },
  { id:'score_500',    label:'500 Points',       desc:'Score 500 points',                 test: s => s.score     >= 500       },
  { id:'score_2000',   label:'2000 Points',      desc:'Score 2000 points',                test: s => s.score     >= 2000      },
  { id:'streak_3',     label:'On Fire! 🔥',      desc:'3-clear streak',                   test: s => s.streak    >= 3         },
  { id:'score_5000',   label:'5000 Points',      desc:'Score 5000 points',                test: s => s.score     >= 5000      },
  { id:'all_types',    label:'Collector',        desc:'Place 10 different piece types',   test: s => s.pieceTypes >= 10       },
];

// ═══════ State ═══════
let state = {};
let board = [];          // 10×10, null | colorString
let selectedPiece = -1;
let pieces = [];         // 3 current pieces {def, color, used}
let paused = false;
let dailyMode = false;
let dailySeed = 0;
let rng;

// Storage
const LS_BEST   = 'blox_best';
const LS_ACH    = 'blox_achievements';
const LS_DAILY  = 'blox_daily';

function getBest()     { return parseInt(localStorage.getItem(LS_BEST)  || '0'); }
function saveBest(v)   { localStorage.setItem(LS_BEST, v); }
function getAchs()     { return JSON.parse(localStorage.getItem(LS_ACH) || '[]'); }
function saveAchs(a)   { localStorage.setItem(LS_ACH, JSON.stringify(a)); }
function getDailyData(){ try { return JSON.parse(localStorage.getItem(LS_DAILY) || 'null'); } catch{ return null; } }
function saveDailyData(d){ localStorage.setItem(LS_DAILY, JSON.stringify(d)); }

// ═══════ Seeded RNG (mulberry32) ═══════
function makeRng(seed) {
  let s = seed >>> 0;
  return function() {
    s |= 0; s = s + 0x6D2B79F5 | 0;
    let t = Math.imul(s ^ s >>> 15, 1 | s);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function randInt(rngFn, min, max) { return Math.floor(rngFn() * (max - min + 1)) + min; }
function randItem(rngFn, arr)     { return arr[Math.floor(rngFn() * arr.length)]; }

// ═══════ Daily seed ═══════
function getDailySeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
}

// ═══════ Board Helpers ═══════
function freshBoard() { return Array.from({length:ROWS}, () => Array(COLS).fill(null)); }

function canPlace(def, row, col) {
  for (const [dr, dc] of def.cells) {
    const r = row+dr, c = col+dc;
    if (r<0||r>=ROWS||c<0||c>=COLS||board[r][c]) return false;
  }
  return true;
}

function placeOnBoard(def, row, col, color) {
  for (const [dr, dc] of def.cells) board[row+dr][col+dc] = color;
}

function removeFromBoard(def, row, col) {
  for (const [dr, dc] of def.cells) board[row+dr][col+dc] = null;
}

function findClearable() {
  const rows=[], cols=[];
  for (let r=0;r<ROWS;r++) if (board[r].every(c=>c!==null)) rows.push(r);
  for (let c=0;c<COLS;c++) if (board.map(row=>row[c]).every(v=>v!==null)) cols.push(c);
  return {rows, cols};
}

function clearLines(rows, cols) {
  const cells = new Set();
  rows.forEach(r => { for(let c=0;c<COLS;c++) cells.add(r*COLS+c); });
  cols.forEach(c => { for(let r=0;r<ROWS;r++) cells.add(r*COLS+c); });
  cells.forEach(idx => { board[Math.floor(idx/COLS)][idx%COLS] = null; });
  return cells.size;
}

function hasAnyMove(pieces) {
  return pieces.some(p => {
    if (p.used) return false;
    for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) if (canPlace(p.def, r, c)) return true;
    return false;
  });
}

// ═══════ Piece generation ═══════
function getAvailableDefs() {
  // Progressive difficulty: limit big pieces early
  const level = Math.floor(state.score / 300);
  return PIECE_DEFS.filter(d => d.size <= Math.min(1 + Math.floor(level/2), 4));
}

function generatePieces() {
  const available = getAvailableDefs();
  return Array.from({length:3}, () => ({
    def:   randItem(rng, available),
    color: randItem(rng, COLORS),
    used:  false,
  }));
}

// ═══════ Scoring ═══════
function calcScore(linesCleared, cellsCleared, comboMult) {
  // Base: 50 per line + 10 per extra cell
  const base = linesCleared * 50 + Math.max(0, cellsCleared - linesCleared * COLS) * 10;
  const combo = comboMult > 1 ? Math.round(base * (comboMult * 0.5)) : 0;
  return base + combo;
}

// ═══════ DOM ═══════
const gridEl  = document.getElementById('grid');
const trayEl  = document.getElementById('tray');
const achBar  = document.getElementById('achievements-bar');
const scoreEl = document.getElementById('score-display');
const bestEl  = document.getElementById('best-display');
const streakEl= document.getElementById('streak-display');
const streakCard = document.getElementById('streak-card');
const toastEl = document.getElementById('toast');

// Build grid cells
function buildGrid() {
  gridEl.innerHTML = '';
  for (let i=0;i<ROWS*COLS;i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.idx = i;
    gridEl.appendChild(cell);
  }
}

function getCellEl(r, c) { return gridEl.children[r*COLS+c]; }

function renderBoard() {
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
    const el = getCellEl(r,c);
    const color = board[r][c];
    if (color) {
      el.style.background = color;
      el.classList.add('filled');
    } else {
      el.style.background = '';
      el.classList.remove('filled','preview','preview-invalid');
    }
  }
}

function clearPreview() {
  for (let i=0;i<ROWS*COLS;i++) {
    gridEl.children[i].classList.remove('preview','preview-invalid');
    if (!board[Math.floor(i/COLS)][i%COLS]) gridEl.children[i].style.background='';
  }
}

function showPreview(def, row, col) {
  clearPreview();
  const valid = canPlace(def, row, col);
  for (const [dr,dc] of def.cells) {
    const r=row+dr, c=col+dc;
    if (r<0||r>=ROWS||c<0||c>=COLS) continue;
    const el = getCellEl(r,c);
    if (valid) {
      el.style.background = pieces[selectedPiece].color;
      el.classList.add('preview');
    } else {
      el.classList.add('preview-invalid');
    }
  }
}

// ═══════ Tray ═══════
function renderTray() {
  trayEl.innerHTML = '';
  pieces.forEach((p, i) => {
    const slot = document.createElement('div');
    slot.className = 'piece-slot' + (p.used ? ' used' : '') + (selectedPiece===i ? ' selected' : '');

    // Build mini grid
    const cells = p.def.cells;
    const maxR = Math.max(...cells.map(c=>c[0]));
    const maxC = Math.max(...cells.map(c=>c[1]));
    const mini = document.createElement('div');
    mini.className = 'piece-mini';
    mini.style.gridTemplateColumns = `repeat(${maxC+1}, 12px)`;
    mini.style.gridTemplateRows    = `repeat(${maxR+1}, 12px)`;
    const grid2 = Array.from({length:maxR+1}, ()=>Array(maxC+1).fill(false));
    cells.forEach(([r,c])=> grid2[r][c]=true);
    grid2.forEach(row => row.forEach(filled => {
      const mc = document.createElement('div');
      mc.className = 'piece-mini-cell';
      mc.style.background = filled ? p.color : 'transparent';
      mini.appendChild(mc);
    }));
    slot.appendChild(mini);
    slot.addEventListener('click', ()=>{ if(!paused) selectPiece(i); });
    trayEl.appendChild(slot);
  });
}

function selectPiece(i) {
  if (pieces[i].used) return;
  selectedPiece = selectedPiece === i ? -1 : i;
  clearPreview();
  renderTray();
}

// ═══════ Grid interaction ═══════
let hoverRow=-1, hoverCol=-1;

gridEl.addEventListener('pointermove', e=>{
  if (selectedPiece<0||paused) return;
  const {row,col} = pointerToCell(e);
  if (row===hoverRow&&col===hoverCol) return;
  hoverRow=row; hoverCol=col;
  // Centre the piece on cursor
  const def = pieces[selectedPiece].def;
  const maxR = Math.max(...def.cells.map(c=>c[0]));
  const maxC = Math.max(...def.cells.map(c=>c[1]));
  showPreview(def, row-Math.floor(maxR/2), col-Math.floor(maxC/2));
});

gridEl.addEventListener('pointerleave', ()=>{ if(selectedPiece>=0) clearPreview(); });

gridEl.addEventListener('pointerup', e=>{
  if (selectedPiece<0||paused) return;
  const {row,col} = pointerToCell(e);
  const def = pieces[selectedPiece].def;
  const maxR = Math.max(...def.cells.map(c=>c[0]));
  const maxC = Math.max(...def.cells.map(c=>c[1]));
  tryPlace(selectedPiece, row-Math.floor(maxR/2), col-Math.floor(maxC/2));
});

// Mobile: tap grid cell while piece selected
gridEl.addEventListener('click', e=>{
  if (selectedPiece<0||paused) return;
  const {row,col} = pointerToCell(e);
  const def = pieces[selectedPiece].def;
  const maxR = Math.max(...def.cells.map(c=>c[0]));
  const maxC = Math.max(...def.cells.map(c=>c[1]));
  tryPlace(selectedPiece, row-Math.floor(maxR/2), col-Math.floor(maxC/2));
});

function pointerToCell(e) {
  const rect = gridEl.getBoundingClientRect();
  const cellSize = (rect.width - 16) / COLS; // account for padding
  const x = (e.clientX||e.touches?.[0]?.clientX||0) - rect.left - 8;
  const y = (e.clientY||e.touches?.[0]?.clientY||0) - rect.top  - 8;
  return {
    row: Math.max(0, Math.min(ROWS-1, Math.floor(y/cellSize))),
    col: Math.max(0, Math.min(COLS-1, Math.floor(x/cellSize))),
  };
}

// ═══════ Place Logic ═══════
async function tryPlace(pidx, row, col) {
  const p = pieces[pidx];
  if (!canPlace(p.def, row, col)) return;

  clearPreview();
  placeOnBoard(p.def, row, col, p.color);
  p.used = true;
  selectedPiece = -1;
  state.pieceTypes = (state.pieceTypes||0) + 1;

  // Render placed cells with flash
  p.def.cells.forEach(([dr,dc])=>{
    getCellEl(row+dr,col+dc).classList.add('flash');
    setTimeout(()=>getCellEl(row+dr,col+dc).classList.remove('flash'),200);
  });

  // Find & clear lines
  const {rows, cols} = findClearable();
  const linesCount = rows.length + cols.length;

  if (linesCount > 0) {
    state.streak = (state.streak||0) + 1;
    state.combo  = (state.combo||0)  + 1;
    state.maxCombo = Math.max(state.maxCombo||0, state.combo);
    state.totalClears = (state.totalClears||0) + linesCount;

    // Flash rows
    rows.forEach(r=>{
      const flash = document.createElement('div');
      flash.className='row-flash';
      flash.style.top = (8 + r*(parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell'))||40)+r*2) + 'px';
      gridEl.appendChild(flash);
      setTimeout(()=>flash.remove(),400);
    });
    cols.forEach(c=>{
      const flash = document.createElement('div');
      flash.className='row-flash';
      flash.style.cssText=`
        top:8px; bottom:8px; height:auto;
        left:${8+c*(parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell'))||40)+c*2}px;
        width:${parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell'))||40}px;
      `;
      gridEl.appendChild(flash);
      setTimeout(()=>flash.remove(),400);
    });

    // Animate clearing cells
    const clearedCells = new Set();
    rows.forEach(r=>{ for(let c=0;c<COLS;c++) clearedCells.add(r*COLS+c); });
    cols.forEach(c=>{ for(let r=0;r<ROWS;r++) clearedCells.add(r*COLS+c); });

    clearedCells.forEach(idx=>{
      const el = gridEl.children[idx];
      el.classList.add('clearing');
      spawnParticles(el);
    });

    await sleep(360);
    clearLines(rows, cols);
    clearedCells.forEach(idx=>gridEl.children[idx].classList.remove('clearing'));

    const pts = calcScore(linesCount, clearedCells.size, state.combo);
    state.score += pts;
    showScorePopup(pts, state.combo);

    // Update streak card pulse
    streakCard.classList.add('streak-active');
    setTimeout(()=>streakCard.classList.remove('streak-active'),400);

    updateBest();
    checkAchievements();
  } else {
    state.streak = 0;
    state.combo  = 0;
  }

  renderBoard();

  // Refresh pieces if all used
  if (pieces.every(p=>p.used)) {
    pieces = generatePieces();
  }

  updateScoreUI();
  renderTray();

  // Check game over
  if (!hasAnyMove(pieces)) {
    await sleep(500);
    if (dailyMode) saveDailyResult();
    showGameOver();
  }
}

function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }

// ═══════ Particles ═══════
function spawnParticles(cellEl) {
  const rect = cellEl.getBoundingClientRect();
  const gridRect = gridEl.getBoundingClientRect();
  const cx = rect.left - gridRect.left + rect.width/2;
  const cy = rect.top  - gridRect.top  + rect.height/2;
  const color = cellEl.style.background || 'var(--accent)';
  for (let i=0;i<6;i++) {
    const p = document.createElement('div');
    p.className='particle';
    p.style.cssText=`
      left:${cx-3}px; top:${cy-3}px;
      background:${color};
      --tx:${(Math.random()-.5)*60}px;
      --ty:${(Math.random()-.5)*60}px;
    `;
    gridEl.appendChild(p);
    setTimeout(()=>p.remove(),700);
  }
}

// ═══════ Score popup ═══════
function showScorePopup(pts, combo) {
  const pop = document.createElement('div');
  pop.className = 'score-popup';
  pop.textContent = '+'+pts + (combo>1?` ×${combo}`:'');
  const gridRect = gridEl.getBoundingClientRect();
  const bodyRect = document.body.getBoundingClientRect();
  pop.style.left = (gridRect.left - bodyRect.left + gridRect.width/2) + 'px';
  pop.style.top  = (gridRect.top  - bodyRect.top  + gridRect.height/2) + 'px';
  pop.style.transform = 'translateX(-50%)';
  document.body.appendChild(pop);
  setTimeout(()=>pop.remove(),900);
}

// ═══════ UI Updates ═══════
function updateScoreUI() {
  scoreEl.textContent  = state.score.toLocaleString();
  bestEl.textContent   = getBest().toLocaleString();
  streakEl.textContent = state.streak||0;
}

function updateBest() {
  if (state.score > getBest()) saveBest(state.score);
}

// ═══════ Achievements ═══════
function buildAchBar() {
  achBar.innerHTML = '';
  const unlocked = getAchs();
  ACHIEVEMENTS.forEach(a=>{
    const dot = document.createElement('div');
    dot.className = 'ach-dot' + (unlocked.includes(a.id) ? ' unlocked' : '');
    dot.title = a.label + ' — ' + a.desc;
    achBar.appendChild(dot);
  });
}

function checkAchievements() {
  const unlocked = getAchs();
  let changed = false;
  ACHIEVEMENTS.forEach(a=>{
    if (!unlocked.includes(a.id) && a.test(state)) {
      unlocked.push(a.id);
      changed = true;
      showToast('🏆 ' + a.label);
    }
  });
  if (changed) { saveAchs(unlocked); buildAchBar(); }
}

// ═══════ Toast ═══════
let toastTimer;
function showToast(msg) {
  clearTimeout(toastTimer);
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  toastTimer = setTimeout(()=>toastEl.classList.remove('show'), 2400);
}

// ═══════ Overlays ═══════
function showOverlay(id)  { document.getElementById(id).classList.remove('hidden'); }
function hideOverlay(id)  { document.getElementById(id).classList.add('hidden'); }

function showGameOver() {
  const best = getBest();
  document.getElementById('gameover-scores').innerHTML = `
    <div class="overlay-score-item"><div class="label">SCORE</div><div class="val">${state.score.toLocaleString()}</div></div>
    <div class="overlay-score-item"><div class="label">BEST</div><div class="val" style="color:var(--gold)">${best.toLocaleString()}</div></div>
    <div class="overlay-score-item"><div class="label">CLEARS</div><div class="val" style="color:var(--accent)">${state.totalClears||0}</div></div>
  `;
  showOverlay('gameover-overlay');
}

// ═══════ Game init ═══════
function initGame(daily=false) {
  dailyMode = daily;
  dailySeed = daily ? getDailySeed() : Math.floor(Math.random()*1e9);
  rng = makeRng(dailySeed);

  board = freshBoard();
  state = { score:0, streak:0, combo:0, maxCombo:0, totalClears:0, pieceTypes:0 };

  // In daily mode, pre-fill some cells for a set start
  if (daily) {
    // Scatter ~15% fill from seed
    for (let i=0;i<15;i++) {
      const r=randInt(rng,0,ROWS-1), c=randInt(rng,0,COLS-1);
      board[r][c] = randItem(rng, COLORS);
    }
  }

  pieces = generatePieces();
  selectedPiece = -1;
  paused = false;

  buildGrid();
  renderBoard();
  renderTray();
  updateScoreUI();
  buildAchBar();

  hideOverlay('start-overlay');
  hideOverlay('pause-overlay');
  hideOverlay('gameover-overlay');
}

// ═══════ Daily challenge save/load ═══════
function saveDailyResult() {
  saveDailyData({ seed: getDailySeed(), score: state.score, date: new Date().toDateString() });
}

function checkDailyPlayed() {
  const d = getDailyData();
  return d && d.date === new Date().toDateString();
}

// ═══════ Button wiring ═══════
document.getElementById('start-btn').onclick = ()=> initGame(false);
document.getElementById('start-daily-btn').onclick = ()=>{
  if (checkDailyPlayed()) { showToast('Already played today — come back tomorrow! 📅'); return; }
  initGame(true);
};
document.getElementById('play-again-btn').onclick = ()=> initGame(false);
document.getElementById('gameover-daily-btn').onclick = ()=>{
  if (checkDailyPlayed()) { showToast('Already played today! 📅'); hideOverlay('gameover-overlay'); return; }
  initGame(true);
};
document.getElementById('daily-btn').onclick = ()=>{
  if (checkDailyPlayed()) { showToast('Daily done! 📅 Come back tomorrow.'); return; }
  if (confirm('Start today\'s Daily Challenge?')) initGame(true);
};
document.getElementById('pause-btn').onclick = ()=>{
  if (!state.score && !board.flat().some(Boolean)) return; // not started
  paused = !paused;
  if (paused) { clearPreview(); showOverlay('pause-overlay'); }
  else hideOverlay('pause-overlay');
};
document.getElementById('resume-btn').onclick = ()=>{
  paused = false; hideOverlay('pause-overlay');
};
document.getElementById('restart-from-pause-btn').onclick = ()=> initGame(dailyMode);

// ═══════ Boot ═══════
bestEl.textContent = getBest().toLocaleString();
buildAchBar();
// Show start screen
showOverlay('start-overlay');
buildGrid();
</script>
</body>
</html>
