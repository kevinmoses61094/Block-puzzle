<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BLOX — Block Puzzle</title>
<style>
  :root {
    --bg:#0f0f1a; --surface:#1a1a2e; --surface2:#252540;
    --border:#2e2e50; --text:#e8e8f4; --muted:#6b6b9a;
    --accent:#7c6af5; --accent2:#f57c6a; --gold:#f5c842;
    --c1:#7c6af5;--c2:#6af5c0;--c3:#f5c842;
    --c4:#f57c6a;--c5:#6ab4f5;--c6:#c06af5;--c7:#f5a06a;
    --cell:clamp(28px,8.5vw,42px); --gap:2px; --r:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);color:var(--text);
    font-family:'Segoe UI',system-ui,sans-serif;
    min-height:100dvh;display:flex;flex-direction:column;
    align-items:center;overflow:hidden;
    touch-action:none;user-select:none;
  }
  header{
    width:100%;max-width:420px;padding:12px 20px 6px;
    display:flex;align-items:center;justify-content:space-between;
  }
  .logo{font-size:22px;font-weight:900;letter-spacing:3px;}
  .logo span{color:var(--accent);}
  .icon-btn{
    background:var(--surface2);border:1px solid var(--border);
    color:var(--muted);width:36px;height:36px;border-radius:10px;
    cursor:pointer;display:grid;place-items:center;font-size:16px;
  }
  .score-bar{width:100%;max-width:420px;padding:0 20px 6px;display:flex;gap:8px;}
  .score-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:6px 10px;text-align:center;}
  .score-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:1px;}
  .score-value{font-size:20px;font-weight:800;line-height:1;}
  #score-display{color:var(--text);}
  #best-display{color:var(--gold);}
  #level-display{color:var(--accent);}
  .speed-bar-wrap{width:100%;max-width:420px;padding:0 20px 4px;display:flex;align-items:center;gap:8px;}
  .speed-label{font-size:10px;color:var(--muted);letter-spacing:1px;white-space:nowrap;}
  .speed-track{flex:1;height:4px;background:var(--surface2);border-radius:4px;overflow:hidden;}
  .speed-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .4s,background .4s;}
  .next-wrap{width:100%;max-width:420px;padding:4px 20px 2px;display:flex;align-items:center;gap:10px;}
  .next-label{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}
  .next-piece-mini{display:grid;gap:2px;margin-left:8px;}
  .next-mini-cell{width:11px;height:11px;border-radius:3px;}
  #achievements-bar{width:100%;max-width:420px;padding:2px 20px 4px;display:flex;gap:6px;justify-content:center;}
  .ach-dot{width:8px;height:8px;border-radius:50%;background:var(--surface2);border:1.5px solid var(--border);transition:background .3s;}
  .ach-dot.unlocked{background:var(--accent);border-color:var(--accent);box-shadow:0 0 8px rgba(124,106,245,.5);}
  .grid-wrap{padding:2px 20px 6px;width:100%;max-width:420px;display:flex;justify-content:center;}
  #grid{
    display:grid;
    grid-template-columns:repeat(10,var(--cell));
    grid-template-rows:repeat(10,var(--cell));
    gap:var(--gap);background:var(--surface);
    border:2px solid var(--border);border-radius:14px;
    padding:8px;position:relative;cursor:grab;
  }
  #grid.dragging{cursor:grabbing;}
  .cell{
    border-radius:var(--r);background:var(--surface2);
    border:1px solid var(--border);
    position:relative;overflow:hidden;
  }
  .cell.filled{border-color:transparent;}
  .cell.filled::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,transparent 60%);
    border-radius:inherit;pointer-events:none;
  }
  .cell.active-piece{border-color:transparent;box-shadow:0 0 10px rgba(255,255,255,.18);}
  .cell.ghost{opacity:.2;border-color:transparent;}
  .cell.clearing{animation:cell-clear .32s ease forwards;}
  @keyframes cell-clear{0%{transform:scale(1);opacity:1;}40%{transform:scale(1.12);}100%{transform:scale(0);opacity:0;}}
  .cell.lock-flash{animation:lock-anim .15s ease;}
  @keyframes lock-anim{0%{transform:scale(1.1);}100%{transform:scale(1);}}
  #drag-ghost{
    position:fixed;pointer-events:none;z-index:200;
    display:grid;gap:2px;opacity:.85;
    transform:translate(-50%,-50%);
    filter:drop-shadow(0 4px 16px rgba(0,0,0,.5));
  }
  #drag-ghost.hidden{display:none;}
  .dg-cell{border-radius:var(--r);}
  .hint-bar{width:100%;max-width:420px;padding:0 20px 6px;text-align:center;font-size:11px;color:var(--muted);}
  .overlay{
    position:fixed;inset:0;background:rgba(10,10,20,.9);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:16px;z-index:100;backdrop-filter:blur(8px);padding:30px;
  }
  .overlay.hidden{display:none;}
  .overlay-card{background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:28px 32px;text-align:center;max-width:320px;width:100%;}
  .overlay-title{font-size:30px;font-weight:900;letter-spacing:1px;margin-bottom:6px;}
  .overlay-sub{color:var(--muted);font-size:14px;margin-bottom:18px;line-height:1.6;}
  .overlay-scores{display:flex;gap:10px;margin-bottom:20px;}
  .overlay-score-item{flex:1;background:var(--surface2);border-radius:12px;padding:10px 6px;}
  .overlay-score-item .label{font-size:10px;letter-spacing:1px;color:var(--muted);margin-bottom:3px;}
  .overlay-score-item .val{font-size:24px;font-weight:800;}
  .btn{display:block;width:100%;padding:13px;border-radius:14px;border:none;font-size:15px;font-weight:700;cursor:pointer;transition:transform .1s;}
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--accent);color:#fff;margin-bottom:8px;}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);margin-bottom:8px;}
  #toast{
    position:fixed;top:68px;left:50%;
    transform:translateX(-50%) translateY(-14px);
    background:var(--surface2);border:1px solid var(--accent);
    color:var(--text);padding:9px 18px;border-radius:30px;
    font-size:13px;font-weight:600;white-space:nowrap;
    opacity:0;pointer-events:none;z-index:300;
    transition:opacity .2s,transform .2s;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .score-popup{
    position:absolute;pointer-events:none;font-size:18px;font-weight:900;
    color:var(--gold);text-shadow:0 2px 8px rgba(0,0,0,.6);
    animation:popup-rise .8s ease forwards;z-index:50;white-space:nowrap;
  }
  @keyframes popup-rise{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-48px);}}
  .particle{position:absolute;width:6px;height:6px;border-radius:50%;pointer-events:none;animation:pfly .55s ease forwards;}
  @keyframes pfly{0%{opacity:1;transform:translate(0,0);}100%{opacity:0;transform:translate(var(--tx),var(--ty));}}
  .row-flash{position:absolute;left:8px;right:8px;height:var(--cell);background:rgba(255,255,255,.13);border-radius:6px;pointer-events:none;animation:rflash .32s ease forwards;z-index:10;}
  @keyframes rflash{0%{opacity:1;}100%{opacity:0;}}
</style>
</head>
<body>

<header>
  <div class="logo">BL<span>O</span>X</div>
  <div class="icon-btn" id="pause-btn">⏸</div>
</header>

<div class="score-bar">
  <div class="score-card"><div class="score-label">Score</div><div class="score-value" id="score-display">0</div></div>
  <div class="score-card"><div class="score-label">Best</div><div class="score-value" id="best-display">0</div></div>
  <div class="score-card"><div class="score-label">Level</div><div class="score-value" id="level-display">1</div></div>
</div>

<div class="speed-bar-wrap">
  <span class="speed-label">SPEED</span>
  <div class="speed-track"><div class="speed-fill" id="speed-fill" style="width:5%"></div></div>
</div>

<div class="next-wrap">
  <span class="next-label">Next</span>
  <div id="next-preview"></div>
</div>

<div id="achievements-bar"></div>

<div class="grid-wrap">
  <div id="grid"></div>
</div>

<div class="hint-bar">👆 Touch &amp; drag the piece left/right · Release to drop</div>

<div id="drag-ghost" class="hidden"></div>

<div class="overlay" id="start-overlay">
  <div class="overlay-card">
    <div class="overlay-title">BL<span style="color:var(--accent)">O</span>X</div>
    <div class="overlay-sub">Pieces fall from the top.<br>Drag left/right to aim.<br>Release to drop!</div>
    <button class="btn btn-primary" id="start-btn">▶ Play Now</button>
    <button class="btn btn-secondary" id="start-daily-btn">📅 Daily Challenge</button>
  </div>
</div>

<div class="overlay hidden" id="pause-overlay">
  <div class="overlay-card">
    <div class="overlay-title">Paused</div>
    <div class="overlay-sub">Take a breath ✨</div>
    <button class="btn btn-primary" id="resume-btn">Resume</button>
    <button class="btn btn-secondary" id="restart-btn">Restart</button>
  </div>
</div>

<div class="overlay hidden" id="gameover-overlay">
  <div class="overlay-card">
    <div class="overlay-title">Game Over</div>
    <div class="overlay-sub">No space left — great run!</div>
    <div class="overlay-scores" id="gameover-scores"></div>
    <button class="btn btn-primary" id="play-again-btn">Play Again</button>
    <button class="btn btn-secondary" id="gameover-daily-btn">📅 Daily Challenge</button>
  </div>
</div>

<div id="toast"></div>

<script>
(function(){
'use strict';

// ── Constants
const ROWS=10,COLS=10;
const COLORS=['#7c6af5','#6af5c0','#f5c842','#f57c6a','#6ab4f5','#c06af5','#f5a06a'];
const PIECE_DEFS=[
  {cells:[[0,0]],tier:0},
  {cells:[[0,0],[0,1]],tier:0},
  {cells:[[0,0],[1,0]],tier:0},
  {cells:[[0,0],[0,1],[0,2]],tier:1},
  {cells:[[0,0],[1,0],[2,0]],tier:1},
  {cells:[[0,0],[0,1],[1,0]],tier:1},
  {cells:[[0,0],[0,1],[1,1]],tier:1},
  {cells:[[0,0],[1,0],[1,1]],tier:1},
  {cells:[[0,1],[1,0],[1,1]],tier:1},
  {cells:[[0,0],[0,1],[0,2],[0,3]],tier:2},
  {cells:[[0,0],[1,0],[2,0],[3,0]],tier:2},
  {cells:[[0,0],[0,1],[1,0],[1,1]],tier:2},
  {cells:[[0,0],[0,1],[0,2],[1,0]],tier:2},
  {cells:[[0,0],[0,1],[0,2],[1,2]],tier:2},
  {cells:[[0,0],[1,0],[2,0],[2,1]],tier:2},
  {cells:[[0,1],[1,1],[2,0],[2,1]],tier:2},
  {cells:[[0,0],[0,1],[1,1],[1,2]],tier:2},
  {cells:[[0,0],[1,0],[2,0],[3,0],[4,0]],tier:3},
  {cells:[[0,0],[0,1],[0,2],[1,0],[1,1]],tier:3},
  {cells:[[0,0],[0,1],[0,2],[1,2],[2,2]],tier:3},
  {cells:[[0,0],[1,0],[1,1],[2,1],[2,2]],tier:3},
];
const ACHIEVEMENTS=[
  {id:'first_clear',label:'First Clear!',test:s=>s.totalClears>=1},
  {id:'level_3',label:'Level 3 🎯',test:s=>s.level>=3},
  {id:'level_5',label:'Level 5 🔥',test:s=>s.level>=5},
  {id:'score_500',label:'500 Points',test:s=>s.score>=500},
  {id:'score_2000',label:'2000 Points',test:s=>s.score>=2000},
  {id:'score_5000',label:'5000 Points 🏆',test:s=>s.score>=5000},
  {id:'combo_3',label:'3× Combo!',test:s=>s.maxCombo>=3},
  {id:'speed_8',label:'Speed Demon ⚡',test:s=>s.level>=8},
];

// ── Storage helpers
const LS={
  getBest:()=>parseInt(localStorage.getItem('blox_best')||'0'),
  saveBest:v=>localStorage.setItem('blox_best',String(v)),
  getAchs:()=>JSON.parse(localStorage.getItem('blox_ach')||'[]'),
  saveAchs:a=>localStorage.setItem('blox_ach',JSON.stringify(a)),
  getDaily:()=>{try{return JSON.parse(localStorage.getItem('blox_daily')||'null');}catch{return null;}},
  saveDaily:d=>localStorage.setItem('blox_daily',JSON.stringify(d)),
};

// ── RNG
function makeRng(seed){
  let s=seed>>>0;
  return function(){
    s=s+0x6D2B79F5|0;
    let t=Math.imul(s^s>>>15,1|s);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return((t^t>>>14)>>>0)/4294967296;
  };
}
function pick(rng,arr){return arr[Math.floor(rng()*arr.length)];}
function dailySeed(){const d=new Date();return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();}

// ── DOM refs (all declared up front)
const gridEl     = document.getElementById('grid');
const scoreEl    = document.getElementById('score-display');
const bestEl     = document.getElementById('best-display');
const levelEl    = document.getElementById('level-display');
const speedFillEl= document.getElementById('speed-fill');
const achBarEl   = document.getElementById('achievements-bar');
const toastEl    = document.getElementById('toast');
const dragGhost  = document.getElementById('drag-ghost');
const nextWrap   = document.getElementById('next-preview');

// ── Game variables
let board, active, nextDef, nextCol_color;
let gs, paused, dropTimer, dailyMode, rng;
let isDragging=false;

// ── Helpers
function freshBoard(){return Array.from({length:ROWS},()=>Array(COLS).fill(null));}
function dropMs(level){return Math.max(250,1500-(level-1)*140);}
function calcLevel(score){return Math.min(10,1+Math.floor(score/300));}
function availDefs(level){const t=level<=2?1:level<=4?2:3;return PIECE_DEFS.filter(d=>d.tier<=t);}
function pieceW(def){return Math.max(...def.cells.map(c=>c[1]))+1;}
function cellPx(){return parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell'))||36;}

function canFit(def,row,col){
  for(const[dr,dc]of def.cells){
    const r=row+dr,c=col+dc;
    if(r<0||r>=ROWS||c<0||c>=COLS||board[r][c])return false;
  }
  return true;
}
function ghostR(){
  if(!active)return-1;
  let r=active.row;
  while(canFit(active.def,r+1,active.col))r++;
  return r;
}

// ── Grid DOM
function buildGrid(){
  gridEl.innerHTML='';
  for(let i=0;i<ROWS*COLS;i++){
    const el=document.createElement('div');
    el.className='cell';
    gridEl.appendChild(el);
  }
}
function cellEl(r,c){return gridEl.children[r*COLS+c];}

function renderBoard(){
  for(let i=0;i<ROWS*COLS;i++){
    const el=gridEl.children[i];
    const r=Math.floor(i/COLS),c=i%COLS;
    el.classList.remove('active-piece','ghost','filled');
    el.style.background='';
    if(board[r][c]){el.style.background=board[r][c];el.classList.add('filled');}
  }
  if(!active)return;
  // ghost
  const gr=ghostR();
  if(gr!==active.row){
    active.def.cells.forEach(([dr,dc])=>{
      const r=gr+dr,c=active.col+dc;
      if(r>=0&&r<ROWS&&c>=0&&c<COLS&&!board[r][c]){
        cellEl(r,c).style.background=active.color;
        cellEl(r,c).classList.add('ghost');
      }
    });
  }
  // active
  active.def.cells.forEach(([dr,dc])=>{
    const r=active.row+dr,c=active.col+dc;
    if(r>=0&&r<ROWS&&c>=0&&c<COLS){
      const el=cellEl(r,c);
      el.style.background=active.color;
      el.classList.remove('ghost','filled');
      el.classList.add('active-piece');
    }
  });
}

// ── Next preview
function renderNext(){
  nextWrap.innerHTML='';
  if(!nextDef)return;
  const maxR=Math.max(...nextDef.cells.map(c=>c[0]));
  const maxC=Math.max(...nextDef.cells.map(c=>c[1]));
  const mini=document.createElement('div');
  mini.className='next-piece-mini';
  mini.style.gridTemplateColumns=`repeat(${maxC+1},11px)`;
  mini.style.gridTemplateRows=`repeat(${maxR+1},11px)`;
  const g=Array.from({length:maxR+1},()=>Array(maxC+1).fill(false));
  nextDef.cells.forEach(([r,c])=>g[r][c]=true);
  g.forEach(row=>row.forEach(f=>{
    const mc=document.createElement('div');
    mc.className='next-mini-cell';
    mc.style.background=f?nextCol_color:'transparent';
    mini.appendChild(mc);
  }));
  nextWrap.appendChild(mini);
}

// ── Score UI
function updateUI(){
  scoreEl.textContent=gs.score.toLocaleString();
  bestEl.textContent=LS.getBest().toLocaleString();
  levelEl.textContent=gs.level;
  const pct=Math.round(5+(gs.level-1)*10.5);
  speedFillEl.style.width=pct+'%';
  speedFillEl.style.background=gs.level>=7?'var(--accent2)':gs.level>=4?'var(--gold)':'var(--accent)';
}
function updateBest(){if(gs.score>LS.getBest())LS.saveBest(gs.score);}

// ── Achievements
function buildAchBar(){
  achBarEl.innerHTML='';
  const ul=LS.getAchs();
  ACHIEVEMENTS.forEach(a=>{
    const d=document.createElement('div');
    d.className='ach-dot'+(ul.includes(a.id)?' unlocked':'');
    d.title=a.label;
    achBarEl.appendChild(d);
  });
}
function checkAchs(){
  const ul=LS.getAchs();let ch=false;
  ACHIEVEMENTS.forEach(a=>{
    if(!ul.includes(a.id)&&a.test(gs)){ul.push(a.id);ch=true;toast('🏆 '+a.label);}
  });
  if(ch){LS.saveAchs(ul);buildAchBar();}
}

// ── Toast
let toastTmr;
function toast(msg){
  clearTimeout(toastTmr);
  toastEl.textContent=msg;toastEl.classList.add('show');
  toastTmr=setTimeout(()=>toastEl.classList.remove('show'),2200);
}

// ── Overlays
function showOv(id){document.getElementById(id).classList.remove('hidden');}
function hideOv(id){document.getElementById(id).classList.add('hidden');}

// ── Particles & popups
function spawnParticles(el){
  const gr=gridEl.getBoundingClientRect();
  const cr=el.getBoundingClientRect();
  const cx=cr.left-gr.left+cr.width/2;
  const cy=cr.top-gr.top+cr.height/2;
  const color=el.style.background||'#7c6af5';
  for(let i=0;i<5;i++){
    const p=document.createElement('div');p.className='particle';
    p.style.cssText=`left:${cx-3}px;top:${cy-3}px;background:${color};--tx:${(Math.random()-.5)*55}px;--ty:${(Math.random()-.5)*55}px;`;
    gridEl.appendChild(p);setTimeout(()=>p.remove(),650);
  }
}
function scorePopup(pts,combo){
  const pop=document.createElement('div');pop.className='score-popup';
  pop.textContent='+'+pts+(combo>1?` ×${combo}`:'');
  const gr=gridEl.getBoundingClientRect();const br=document.body.getBoundingClientRect();
  pop.style.cssText=`left:${gr.left-br.left+gr.width/2}px;top:${gr.top-br.top+gr.height/2}px;transform:translateX(-50%);`;
  document.body.appendChild(pop);setTimeout(()=>pop.remove(),850);
}

// ── Piece spawn
function prepareNext(){
  nextDef=pick(rng,availDefs(gs.level));
  nextCol_color=pick(rng,COLORS);
}
function spawnPiece(){
  const def=nextDef,color=nextCol_color;
  const col=Math.floor((COLS-pieceW(def))/2);
  active={def,color,row:0,col};
  prepareNext();renderNext();
  if(!canFit(def,0,col)){endGame();return false;}
  return true;
}

// ── Lock & clear
function lockPiece(){
  if(!active)return;
  const{def,color,row,col}=active;
  for(const[dr,dc]of def.cells)board[row+dr][col+dc]=color;
  def.cells.forEach(([dr,dc])=>{
    const el=cellEl(row+dr,col+dc);
    el.classList.add('lock-flash');
    setTimeout(()=>el.classList.remove('lock-flash'),180);
  });
  active=null;
  processClears();
}

function processClears(){
  const rows=[],cols=[];
  for(let r=0;r<ROWS;r++)if(board[r].every(c=>c!==null))rows.push(r);
  for(let c=0;c<COLS;c++)if(board.map(ro=>ro[c]).every(v=>v!==null))cols.push(c);
  const n=rows.length+cols.length;

  if(n>0){
    gs.combo=(gs.combo||0)+1;
    gs.maxCombo=Math.max(gs.maxCombo||0,gs.combo);
    gs.totalClears=(gs.totalClears||0)+n;
    const px=cellPx();
    rows.forEach(r=>{
      const fl=document.createElement('div');fl.className='row-flash';
      fl.style.top=(8+r*(px+2))+'px';gridEl.appendChild(fl);
      setTimeout(()=>fl.remove(),380);
    });
    cols.forEach(c=>{
      const fl=document.createElement('div');fl.className='row-flash';
      fl.style.cssText=`top:8px;bottom:8px;height:auto;left:${8+c*(px+2)}px;width:${px}px;`;
      gridEl.appendChild(fl);setTimeout(()=>fl.remove(),380);
    });
    const cleared=new Set();
    rows.forEach(r=>{for(let c=0;c<COLS;c++)cleared.add(r*COLS+c);});
    cols.forEach(c=>{for(let r=0;r<ROWS;r++)cleared.add(r*COLS+c);});
    cleared.forEach(i=>{const el=gridEl.children[i];el.classList.add('clearing');spawnParticles(el);});
    setTimeout(()=>{
      rows.forEach(r=>{for(let c=0;c<COLS;c++)board[r][c]=null;});
      cols.forEach(c=>{for(let r=0;r<ROWS;r++)board[r][c]=null;});
      cleared.forEach(i=>gridEl.children[i].classList.remove('clearing'));
      const pts=n*50+(gs.combo>1?Math.round(n*50*(gs.combo*.5)):0);
      gs.score+=pts;
      const lv=calcLevel(gs.score);
      if(lv>gs.level){gs.level=lv;toast('⚡ Level '+lv+'!');restartTimer();}
      scorePopup(pts,gs.combo);updateBest();checkAchs();updateUI();
      renderBoard();
      if(!spawnPiece())return;
      renderBoard();
    },370);
  } else {
    gs.combo=0;updateUI();renderBoard();
    spawnPiece();renderBoard();
  }
}

// ── Drop tick
function tick(){
  if(paused||!active||isDragging)return;
  if(canFit(active.def,active.row+1,active.col)){active.row++;renderBoard();}
  else lockPiece();
}
function restartTimer(){
  clearInterval(dropTimer);
  if(!paused)dropTimer=setInterval(tick,dropMs(gs.level));
}

// ── Hard drop (snap to bottom)
function hardDrop(){
  if(!active||paused)return;
  const gr=ghostR();
  gs.score+=Math.max(0,gr-active.row);
  active.row=gr;
  renderBoard();
  clearInterval(dropTimer);
  lockPiece();
  if(!paused)dropTimer=setInterval(tick,dropMs(gs.level));
}

// ── Drag ghost visual
function buildDragGhost(){
  const px=cellPx();
  const def=active.def;
  const maxR=Math.max(...def.cells.map(c=>c[0]));
  const maxC=Math.max(...def.cells.map(c=>c[1]));
  dragGhost.innerHTML='';
  dragGhost.style.gridTemplateColumns=`repeat(${maxC+1},${px}px)`;
  dragGhost.style.gridTemplateRows=`repeat(${maxR+1},${px}px)`;
  const g=Array.from({length:maxR+1},()=>Array(maxC+1).fill(false));
  def.cells.forEach(([r,c])=>g[r][c]=true);
  g.forEach(row=>row.forEach(f=>{
    const dc=document.createElement('div');
    dc.className='dg-cell';
    dc.style.cssText=`width:${px}px;height:${px}px;background:${f?active.color:'transparent'};`;
    dragGhost.appendChild(dc);
  }));
  dragGhost.classList.remove('hidden');
}
function moveDragGhost(x,y){dragGhost.style.left=x+'px';dragGhost.style.top=y+'px';}
function hideDragGhost(){dragGhost.classList.add('hidden');}

function colFromX(clientX){
  const rect=gridEl.getBoundingClientRect();
  const px=cellPx();
  const x=clientX-rect.left-8;
  return Math.max(0,Math.min(COLS-1,Math.floor(x/(px+2))));
}
function applyDragCol(clientX){
  if(!active)return;
  const tc=colFromX(clientX);
  const half=Math.floor(pieceW(active.def)/2);
  const nc=Math.max(0,Math.min(COLS-pieceW(active.def),tc-half));
  if(nc!==active.col&&canFit(active.def,active.row,nc)){active.col=nc;renderBoard();}
}

// Touch
gridEl.addEventListener('touchstart',function(e){
  if(paused||!active)return;
  e.preventDefault();
  isDragging=true;
  buildDragGhost();
  moveDragGhost(e.touches[0].clientX,e.touches[0].clientY);
  gridEl.classList.add('dragging');
},{passive:false});

gridEl.addEventListener('touchmove',function(e){
  if(!isDragging||!active)return;
  e.preventDefault();
  moveDragGhost(e.touches[0].clientX,e.touches[0].clientY);
  applyDragCol(e.touches[0].clientX);
},{passive:false});

gridEl.addEventListener('touchend',function(e){
  if(!isDragging)return;
  e.preventDefault();
  isDragging=false;
  hideDragGhost();
  gridEl.classList.remove('dragging');
  hardDrop();
},{passive:false});

// Mouse
gridEl.addEventListener('mousedown',function(e){
  if(paused||!active)return;
  isDragging=true;
  buildDragGhost();
  moveDragGhost(e.clientX,e.clientY);
  gridEl.classList.add('dragging');
});
document.addEventListener('mousemove',function(e){
  if(!isDragging||!active)return;
  moveDragGhost(e.clientX,e.clientY);
  applyDragCol(e.clientX);
});
document.addEventListener('mouseup',function(){
  if(!isDragging)return;
  isDragging=false;
  hideDragGhost();
  gridEl.classList.remove('dragging');
  hardDrop();
});

// Keyboard
document.addEventListener('keydown',function(e){
  if(!active||paused)return;
  if(e.key==='ArrowLeft'||e.key==='a'){e.preventDefault();if(canFit(active.def,active.row,active.col-1)){active.col--;renderBoard();}}
  if(e.key==='ArrowRight'||e.key==='d'){e.preventDefault();if(canFit(active.def,active.row,active.col+1)){active.col++;renderBoard();}}
  if(e.key==='ArrowDown'||e.key==='s'||e.key===' '){e.preventDefault();hardDrop();}
  if(e.key==='Escape'||e.key==='p'){document.getElementById('pause-btn').click();}
});

// ── End game
function endGame(){
  clearInterval(dropTimer);isDragging=false;hideDragGhost();
  if(dailyMode)LS.saveDaily({date:new Date().toDateString(),score:gs.score});
  const best=LS.getBest();
  document.getElementById('gameover-scores').innerHTML=`
    <div class="overlay-score-item"><div class="label">SCORE</div><div class="val">${gs.score.toLocaleString()}</div></div>
    <div class="overlay-score-item"><div class="label">BEST</div><div class="val" style="color:var(--gold)">${best.toLocaleString()}</div></div>
    <div class="overlay-score-item"><div class="label">LEVEL</div><div class="val" style="color:var(--accent)">${gs.level}</div></div>
  `;
  setTimeout(()=>showOv('gameover-overlay'),400);
}

// ── Init
function initGame(daily){
  clearInterval(dropTimer);isDragging=false;hideDragGhost();
  dailyMode=!!daily;
  rng=makeRng(daily?dailySeed():Math.floor(Math.random()*1e9));
  board=freshBoard();
  gs={score:0,level:1,combo:0,maxCombo:0,totalClears:0};
  paused=false;active=null;
  prepareNext();renderNext();
  buildGrid();renderBoard();updateUI();buildAchBar();
  hideOv('start-overlay');hideOv('pause-overlay');hideOv('gameover-overlay');
  setTimeout(function(){spawnPiece();renderBoard();dropTimer=setInterval(tick,dropMs(1));},300);
}

// ── Button wiring
document.getElementById('start-btn').addEventListener('click',function(){initGame(false);});
document.getElementById('start-daily-btn').addEventListener('click',function(){
  const d=LS.getDaily();
  if(d&&d.date===new Date().toDateString()){toast('Already played today! 📅');return;}
  initGame(true);
});
document.getElementById('play-again-btn').addEventListener('click',function(){initGame(false);});
document.getElementById('gameover-daily-btn').addEventListener('click',function(){
  const d=LS.getDaily();
  if(d&&d.date===new Date().toDateString()){toast('Already played today! 📅');hideOv('gameover-overlay');return;}
  initGame(true);
});
document.getElementById('pause-btn').addEventListener('click',function(){
  if(!active&&!board)return;
  paused=!paused;
  if(paused){clearInterval(dropTimer);isDragging=false;hideDragGhost();showOv('pause-overlay');}
  else{hideOv('pause-overlay');dropTimer=setInterval(tick,dropMs(gs.level));}
});
document.getElementById('resume-btn').addEventListener('click',function(){
  paused=false;hideOv('pause-overlay');dropTimer=setInterval(tick,dropMs(gs.level));
});
document.getElementById('restart-btn').addEventListener('click',function(){initGame(dailyMode);});

// ── Boot
bestEl.textContent=LS.getBest().toLocaleString();
buildAchBar();
buildGrid();
showOv('start-overlay');

})();
</script>
